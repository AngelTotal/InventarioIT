<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Inventory | Control de Activos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-card glass-panel fade-in">
                <div class="login-header">
                    <div class="logo-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h1>IT Inventory</h1>
                    <p class="subtitle">Gestión de Activos Tecnológicos</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" id="username" placeholder="Ingrese su usuario" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div id="login-error" class="error-msg hidden">Credenciales inválidas.</div>
                    <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
                </form>
                <div class="login-footer">
                    <p>Acceso restringido a personal de TI</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Dashboard Application -->
    <div id="app-screen" class="screen hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sidebar-logo"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span>IT Inventory</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="inventory">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    <span>Inventario</span>
                </a>
                <a href="#" class="nav-item" data-view="assignments">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
                    <span>Asignaciones</span>
                </a>
                <a href="#" class="nav-item" data-view="licenses">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
                    <span>Licencias</span>
                </a>
                <a href="#" class="nav-item" data-view="network">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6" y2="6"/><line x1="6" y1="18" x2="6" y2="18"/></svg>
                    <span>Red</span>
                </a>
                <a href="#" class="nav-item" data-view="users" id="nav-users">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Usuarios</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" alt="Avatar">
                    <div class="user-info">
                        <span id="user-name">Usuario TI</span>
                        <span id="user-role">Admin</span>
                    </div>
                </div>
                <button id="logout-btn" class="logout-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h2 id="view-title">Dashboard</h2>
                <div class="header-actions">
                    <button class="btn btn-icon ripple">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    </button>
                    <div class="search-bar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Buscar activos...">
                    </div>
                </div>
            </header>

            <div id="content-area" class="content-body">
                <!-- Views will be injected here -->
            </div>
        </main>
    </div>

    <!-- Templates for Views -->
    <template id="tpl-dashboard">
        <div class="stats-grid animate-fade-in">
            <div class="stat-card glass-panel">
                <div class="stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                <div class="stat-info">
                    <h3>Dispositivos</h3>
                    <p class="stat-value" id="stat-devices">0</p>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M18 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg></div>
                <div class="stat-info">
                    <h3>Asignaciones</h3>
                    <p class="stat-value" id="stat-assignments">0</p>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg></div>
                <div class="stat-info">
                    <h3>Licencias Activas</h3>
                    <p class="stat-value" id="stat-licenses">0</p>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                <div class="stat-info">
                    <h3>Alertas Red</h3>
                    <p class="stat-value" id="stat-network">0</p>
                </div>
            </div>
        </div>

        <div class="dashboard-secondary fade-in-up">
            <div class="data-card glass-panel recent-activity">
                <div class="card-header">
                    <h3>Actividad Reciente</h3>
                    <button class="btn btn-ghost btn-sm">Ver Todo</button>
                </div>
                <div class="activity-list" id="recent-activity-list">
                    <!-- Activities will be injected -->
                    <div class="empty-state">No hay actividad reciente</div>
                </div>
            </div>
            <div class="data-card glass-panel tutorials-preview">
                <div class="card-header">
                    <h3>Guías Rápidas</h3>
                </div>
                <div class="preview-grid" id="tutorials-preview-list">
                    <!-- Tutorials will be injected -->
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-table-view">
        <div class="table-container glass-panel animate-fade-in">
            <div class="table-header">
                <div class="table-actions">
                    <button class="btn btn-primary btn-sm" id="btn-add-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Añadir Nuevo
                    </button>
                    <button class="btn btn-outline btn-sm">Exportar CSV</button>
                </div>
            </div>
            <div class="responsive-table">
                <table id="data-table">
                    <thead>
                        <tr id="table-head-row">
                            <!-- Headers will be injected -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will be injected -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
